name: Update CB Data

on:
  schedule:
    - cron: '30 7 * * 1-5'  # UTC 07:30 = 台灣 15:30，週一到週五
  workflow_dispatch:          # 允許在 GitHub 網頁手動觸發

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch TPEX data and build HTML
        run: python scripts/fetch_and_build.py

      - name: Commit and push updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update CB data $(date -u +%Y-%m-%d)"
          git push
